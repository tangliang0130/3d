<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Real-time 3D — Walk the Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--char:#13100c;--beige:#e8dfd3;--beige2:#f6f1e9;--bronze:#9c7a4f;--ease:cubic-bezier(.22,.61,.36,1)}
  html,body{height:100%;overflow:hidden}
  body{background:var(--char);color:var(--beige);font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--bronze);color:var(--char)}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:2;box-shadow:inset 0 0 240px 50px rgba(6,4,3,.6)}
  .eyebrow{font-size:.7rem;letter-spacing:.4em;text-transform:uppercase;opacity:.7}
  .badge{position:fixed;top:clamp(1.2rem,4vw,2.6rem);left:clamp(1.2rem,4vw,3rem);z-index:5;
    font-size:.6rem;letter-spacing:.26em;text-transform:uppercase;opacity:.7;border:1px solid rgba(232,223,211,.28);padding:.45rem .8rem;border-radius:2px}
  .title{position:fixed;left:clamp(1.2rem,4vw,3rem);bottom:clamp(1.4rem,4vw,2.8rem);z-index:5;pointer-events:none;max-width:30ch}
  .title .eyebrow{color:var(--beige2)}
  .title h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(2rem,5vw,3.6rem);line-height:1.04;margin-top:.4rem;text-shadow:0 2px 26px rgba(0,0,0,.5)}
  .title h1 em{font-style:italic}
  .hint{position:fixed;right:clamp(1.2rem,4vw,3rem);bottom:clamp(1.4rem,4vw,2.8rem);z-index:5;text-align:right;
    font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;opacity:.62;line-height:2;pointer-events:none}
  .loader{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;
    background:var(--char);transition:opacity .8s var(--ease)}
  .loader.gone{opacity:0;pointer-events:none}
  .loader .ring{width:46px;height:46px;border:1px solid rgba(232,223,211,.25);border-top-color:var(--bronze);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader .lbl{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;opacity:.7}
  .loader .pct{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300}
  .err{max-width:34ch;text-align:center;font-weight:300;line-height:1.7;opacity:.85;font-size:.95rem}
  .btn{position:fixed;left:50%;bottom:clamp(1.4rem,4vw,2.8rem);transform:translateX(-50%);z-index:6;
    font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--beige);
    background:rgba(20,16,12,.6);border:1px solid rgba(232,223,211,.32);padding:.75rem 1.4rem;border-radius:3px;cursor:pointer;
    backdrop-filter:blur(8px);transition:background .3s var(--ease),opacity .3s}
  .btn:hover{background:rgba(156,122,79,.4);border-color:var(--bronze)}
  .crosshair{position:fixed;left:50%;top:50%;width:9px;height:9px;margin:-4.5px 0 0 -4.5px;z-index:6;
    border:1px solid rgba(247,241,233,.85);border-radius:50%;display:none;pointer-events:none}
  .fphint{position:fixed;left:50%;bottom:clamp(1.4rem,4vw,2.8rem);transform:translateX(-50%);z-index:6;display:none;
    font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;opacity:.72;white-space:nowrap;pointer-events:none}
  body.walk .crosshair, body.walk .fphint{display:block}
  body.walk .btn, body.walk .hint, body.walk .title{display:none}
  .tod{position:fixed;top:clamp(1.2rem,4vw,2.6rem);right:clamp(1.2rem,4vw,3rem);z-index:6;display:flex;gap:.4rem}
  .views{position:fixed;top:clamp(1.2rem,4vw,2.6rem);left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:.4rem}
  .tod button,.views button{font-family:'Jost',sans-serif;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--beige);
    background:rgba(20,16,12,.55);border:1px solid rgba(232,223,211,.25);padding:.5rem .7rem;border-radius:2px;cursor:pointer;
    backdrop-filter:blur(8px);transition:background .25s,border-color .25s}
  .tod button:hover,.views button:hover{background:rgba(156,122,79,.35)}
  .tod button.on,.views button.on{background:rgba(156,122,79,.55);border-color:var(--bronze);color:var(--beige2)}
  body.walk .tod,body.walk .views{display:none}
  /* on-screen joystick + exit for touch devices */
  .joystick{position:fixed;left:6vw;bottom:9vh;width:120px;height:120px;border-radius:50%;z-index:7;display:none;
    border:1px solid rgba(232,223,211,.35);background:rgba(20,16,12,.32);backdrop-filter:blur(4px);touch-action:none}
  .joy-thumb{position:absolute;left:50%;top:50%;width:48px;height:48px;margin:-24px 0 0 -24px;border-radius:50%;
    background:rgba(232,223,211,.55);border:1px solid rgba(232,223,211,.7)}
  .exitwalk{position:fixed;right:6vw;bottom:10vh;z-index:7;display:none;font-family:'Jost',sans-serif;
    font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--beige);
    background:rgba(20,16,12,.6);border:1px solid rgba(232,223,211,.32);padding:.7rem 1rem;border-radius:3px}
  body.mwalk .joystick,body.mwalk .exitwalk,body.mwalk .crosshair{display:block}
  .hctl{display:none;position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:8;align-items:center;gap:.5rem;
    background:rgba(20,16,12,.62);border:1px solid rgba(232,223,211,.28);border-radius:5px;padding:.35rem .5rem;backdrop-filter:blur(8px)}
  .hctl button{width:32px;height:32px;border:0;border-radius:4px;background:rgba(232,223,211,.14);color:var(--beige);font-size:1.15rem;line-height:1;cursor:pointer}
  .hctl button:active{background:rgba(156,122,79,.55)}
  .hctl span{font-size:.66rem;letter-spacing:.1em;color:var(--beige);min-width:92px;text-align:center}
  body.walk .hctl{display:flex}
  .rotate{display:none;position:fixed;inset:0;z-index:50;background:var(--char);flex-direction:column;align-items:center;justify-content:center;gap:1.3rem;text-align:center;padding:2rem}
  .rotate .ph{width:62px;height:62px;animation:rot 2.4s var(--ease) infinite}
  .rotate .ph svg{width:100%;height:100%;fill:none;stroke:var(--beige);stroke-width:2;stroke-linejoin:round}
  .rotate .t{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.7rem}
  .rotate .s{font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;opacity:.6}
  @keyframes rot{0%,28%{transform:rotate(0)}72%,100%{transform:rotate(-90deg)}}
  @media (max-width:820px) and (orientation:portrait){ .rotate{display:flex} }
  @media (max-width: 680px){
    .badge,.title,.hint{display:none}
    .views{top:.6rem;left:50%;transform:translateX(-50%);gap:.3rem}
    .tod{top:3.0rem;right:auto;left:50%;transform:translateX(-50%);gap:.3rem}
    .tod button,.views button{font-size:.56rem;letter-spacing:.05em;padding:.42rem .5rem}
    .btn{bottom:1rem;font-size:.66rem;padding:.7rem 1.1rem}
    body.walk .fphint{display:none}
  }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
</head>
<body>
  <canvas id="gl"></canvas>
  <div class="vignette"></div>
  <span class="badge">Three.js · WebGL · Real-time 3D</span>
  <div class="tod" id="tod">
    <button data-t="day" class="on">白天</button>
    <button data-t="dusk">黄昏</button>
    <button data-t="night">夜晚</button>
    <button data-t="auto">自动</button>
  </div>
  <div class="views" id="views">
    <button data-v="0">全景</button>
    <button data-v="1">正面</button>
    <button data-v="2">俯瞰</button>
    <button data-v="3">内部</button>
  </div>
  <div class="title">
    <span class="eyebrow">Live Model · Modern House</span>
    <h1 class="serif">Real 3D — <em>walk the space</em></h1>
  </div>
  <div class="hint">拖动 · 旋转<br>滚轮 · 缩放<br>右键 · 平移</div>
  <button class="btn" id="walkBtn">进入漫游 · Walk (WASD)</button>
  <div class="crosshair"></div>
  <div class="fphint">W·A·S·D 移动　·　鼠标 看　·　Shift 跑　·　[ ] 视高　·　1/2/3 昼夜　·　ESC 退出</div>
  <div class="joystick" id="joy"><div class="joy-thumb" id="joyThumb"></div></div>
  <button class="exitwalk" id="exitWalk">退出漫游</button>
  <div class="hctl" id="hctl"><button data-h="-1">−</button><span id="hval">视高 1.60m</span><button data-h="1">+</button></div>
  <div class="rotate"><div class="ph"><svg viewBox="0 0 44 44"><rect x="14" y="5" width="16" height="30" rx="3"/><line x1="22" y1="31" x2="22" y2="31"/></svg></div><div class="t">横屏体验更佳</div><div class="s">旋转手机 · Rotate to landscape</div></div>
  <div class="loader" id="loader">
    <div class="ring"></div>
    <div class="pct" id="pct">0%</div>
    <div class="lbl">Loading 3D scene</div>
  </div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { Octree } from 'three/addons/math/Octree.js';
import { Capsule } from 'three/addons/math/Capsule.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

const MODELS = {
  house:  { url: 'assets/house/house.obj',    scale: 0.02   },   // normalize arbitrary units -> meters
  castle: { url: 'assets/sponza/Sponza.gltf', scale: 0.0085 }    // real-scale models exported in meters use scale: 1
};
const _mp = new URLSearchParams(location.search).get('model');
const _m = MODELS[_mp] || MODELS.house;
const MODEL_URL = _m.url, MODEL_SCALE = _m.scale;
const IS_OBJ = MODEL_URL.toLowerCase().endsWith('.obj');
{ const lbl = { house: 'Modern House', castle: 'Sponza Palace' }[_mp] || 'Modern House';
  const el = document.querySelector('.title .eyebrow'); if (el) el.textContent = 'Live Model · ' + lbl; }

const canvas = document.getElementById('gl');
const loaderEl = document.getElementById('loader');
const pctEl = document.getElementById('pct');

const MOBILE = matchMedia('(pointer:coarse)').matches || ('ontouchstart' in window);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !MOBILE, powerPreference: 'high-performance' });
renderer.setPixelRatio(MOBILE ? 1 : Math.min(2, window.devicePixelRatio||1));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = !MOBILE;   // shadows off on phones (big GPU/memory saving)
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = null;   // the Sky mesh is the background

const pmrem = new THREE.PMREMGenerator(renderer);
const hemi = new THREE.HemisphereLight(0xffffff, 0x3a3026, 0.6);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff1dd, 2.2);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.bias = -0.0004;
scene.add(sun);

// ---- sky + day/night cycle ----
const sky = new Sky(); sky.scale.setScalar(450000); scene.add(sky);
sky.material.uniforms['turbidity'].value = 4;
sky.material.uniforms['rayleigh'].value = 3;
sky.material.uniforms['mieCoefficient'].value = 0.005;
sky.material.uniforms['mieDirectionalG'].value = 0.8;
const envScene = new THREE.Scene();
const _sun = new THREE.Vector3();
const C_sunLow = new THREE.Color(0xff7a33), C_sunHigh = new THREE.Color(0xfff3e0), C_moon = new THREE.Color(0x9fb4dd);
const C_skyNight = new THREE.Color(0x24314d), C_skyDay = new THREE.Color(0xbcd2ff);
const C_gndNight = new THREE.Color(0x0a0a12), C_gndDay = new THREE.Color(0x4a3e2e);
let modelScale = 30, _envAt = 0, autoCycle = false, tod = 0.38;
const PRESETS = { day: 0.38, dusk: 0.72, night: 0.96 };

// stars, visible at night
const starGeo = new THREE.BufferGeometry();
{ const N = 2500, a = [], v = new THREE.Vector3();
  for (let i = 0; i < N; i++){ v.randomDirection(); a.push(v.x, Math.abs(v.y), v.z); }   // unit sphere, upper hemisphere
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(a, 3)); }
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 2, sizeAttenuation: false, transparent: true, opacity: 0, depthWrite: false, toneMapped: false });
const stars = new THREE.Points(starGeo, starMat); stars.scale.setScalar(800); scene.add(stars);

// interior lamps (glow at night)
let interiorLights = [], glowMeshes = [], lightBaseIntensity = 100;

// camera viewpoint presets + smooth fly
let viewPresets = [], flying = false, flyT = 0;
const flyFromPos = new THREE.Vector3(), flyToPos = new THREE.Vector3(), flyFromTgt = new THREE.Vector3(), flyToTgt = new THREE.Vector3();
const easeInOut = t => t < .5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2;
function flyTo(i){
  const v = viewPresets[i]; if (!v) return;
  controls.autoRotate = false;
  flyFromPos.copy(camera.position); flyToPos.copy(v.p);
  flyFromTgt.copy(controls.target); flyToTgt.copy(v.t);
  flyT = 0; flying = true;
}

function setTimeOfDay(t){
  tod = ((t % 1) + 1) % 1;
  const elev = Math.sin((tod - 0.25) * Math.PI * 2) * 62;     // sun elevation in degrees
  const phi = THREE.MathUtils.degToRad(90 - elev);
  _sun.setFromSphericalCoords(1, phi, THREE.MathUtils.degToRad(tod * 360));
  sky.material.uniforms['sunPosition'].value.copy(_sun);
  sun.position.copy(_sun).multiplyScalar(modelScale * 6);
  const up = Math.max(0, Math.sin(THREE.MathUtils.degToRad(elev)));   // 0 = night … 1 = noon
  const warm = THREE.MathUtils.smoothstep(up, 0, 0.4);
  if (elev > 2){ sun.intensity = up * 3.2 + 0.05; sun.color.lerpColors(C_sunLow, C_sunHigh, warm); }
  else { sun.intensity = 0.25; sun.color.copy(C_moon); }            // moonlight
  hemi.intensity = 0.18 + up * 0.4;
  hemi.color.lerpColors(C_skyNight, C_skyDay, up);
  hemi.groundColor.lerpColors(C_gndNight, C_gndDay, up);
  renderer.toneMappingExposure = 0.38 + up * 0.6;
  const night = 1 - THREE.MathUtils.smoothstep(up, 0, 0.12);    // 1 at night, 0 in daylight
  starMat.opacity = night;
  for (const l of interiorLights) l.intensity = night * lightBaseIntensity;
  for (const m of glowMeshes) m.material.emissiveIntensity = night * 2.5;
  const now = performance.now();
  if (now - _envAt > 220){          // refresh image-based lighting from the sky (throttled)
    _envAt = now;
    scene.remove(sky); envScene.add(sky);
    const rt = pmrem.fromScene(envScene);
    envScene.remove(sky); scene.add(sky);
    if (scene.environment && scene.environment.dispose) scene.environment.dispose();
    scene.environment = rt.texture;
  }
}
setTimeOfDay(tod);

const todBar = document.getElementById('tod');
function setPreset(name){
  if (name === 'auto') autoCycle = !autoCycle;
  else { autoCycle = false; setTimeOfDay(PRESETS[name]); }
  todBar.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.t === name && (name !== 'auto' || autoCycle)));
}
todBar.querySelectorAll('button').forEach(b => b.addEventListener('click', () => setPreset(b.dataset.t)));
addEventListener('keydown', e => {
  if (e.code === 'Digit1') setPreset('day');
  else if (e.code === 'Digit2') setPreset('dusk');
  else if (e.code === 'Digit3') setPreset('night');
  else if (e.code === 'Digit4') setPreset('auto');
});
document.querySelectorAll('#views button').forEach(b => b.addEventListener('click', () => flyTo(+b.dataset.v)));

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 2000);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.autoRotate = true; controls.autoRotateSpeed = 0.45;
controls.screenSpacePanning = false;

let lastW = 0, lastH = 0, mixer = null;
const clock = new THREE.Clock();

// ---- first-person walk mode (WASD + mouse look, with collision) ----
const fp = new PointerLockControls(camera, document.body);
const keys = {};
let fpActive = false;
const fpStart = new THREE.Vector3();
let worldOctree = null, playerCapsule = null, playerOnFloor = false;
let floorY = 0, R = 0.3, H = 1.7, GRAVITY = 30, ACCEL_GROUND = 40, ACCEL_AIR = 12, eyeHeight = 1.6;
const STEPS = 5;
const playerVelocity = new THREE.Vector3();
const _dir = new THREE.Vector3(), _step = new THREE.Vector3();
const forwardVec = () => { camera.getWorldDirection(_dir); _dir.y = 0; return _dir.clone().normalize(); };
const sideVec    = () => { camera.getWorldDirection(_dir); _dir.y = 0; _dir.normalize(); return _dir.cross(camera.up).clone(); };
function resetPlayer(){
  if(!playerCapsule) return;
  playerCapsule.start.set(fpStart.x, floorY + R, fpStart.z);
  playerCapsule.end.set(fpStart.x, floorY + eyeHeight, fpStart.z);
  playerVelocity.set(0,0,0); playerOnFloor = false;
}
function applyHeight(){ if(!playerCapsule) return; const feetY = playerCapsule.start.y - R; playerCapsule.end.y = feetY + eyeHeight; }
const hval = document.getElementById('hval');
function setHeight(v){ eyeHeight = Math.max(1.2, Math.min(2.2, Math.round(v*100)/100)); if(hval) hval.textContent = '视高 ' + eyeHeight.toFixed(2) + 'm'; applyHeight(); }
document.querySelectorAll('#hctl button').forEach(b => b.addEventListener('click', () => setHeight(eyeHeight + 0.05 * (+b.dataset.h))));
addEventListener('keydown', e => { if(e.code==='BracketRight') setHeight(eyeHeight+0.05); else if(e.code==='BracketLeft') setHeight(eyeHeight-0.05); });
setHeight(eyeHeight);
addEventListener('keydown', e => { keys[e.code] = true; });
addEventListener('keyup',   e => { keys[e.code] = false; });
// touch devices (phones/tablets) have no Pointer Lock -> use on-screen joystick + drag-to-look
const isTouch = matchMedia('(pointer: coarse)').matches || ('ontouchstart' in window);
let mobileWalk = false, mvX = 0, mvY = 0, yaw = 0, pitch = 0;
let lookId = null, lookX = 0, lookY = 0, joyId = null, joyCx = 0, joyCy = 0;
const JOY_R = 60;
const joyEl = document.getElementById('joy'), joyThumb = document.getElementById('joyThumb');

document.getElementById('walkBtn').addEventListener('click', () => {
  resetPlayer();
  if (isTouch) enterMobileWalk(); else fp.lock();
});
document.getElementById('exitWalk').addEventListener('click', exitMobileWalk);

function enterMobileWalk(){
  mobileWalk = true; fpActive = true; controls.enabled = false; controls.autoRotate = false;
  const e = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ'); yaw = e.y; pitch = e.x;
  document.body.classList.add('walk', 'mwalk');
}
function exitMobileWalk(){
  mobileWalk = false; fpActive = false; controls.enabled = true; mvX = mvY = 0;
  document.body.classList.remove('walk', 'mwalk');
  const f = forwardVec(); controls.target.copy(camera.position).add(f.multiplyScalar(H * 3)); controls.update();
}
function updateJoy(x, y){
  let dx = x - joyCx, dy = y - joyCy; const d = Math.hypot(dx, dy), m = Math.min(d, JOY_R);
  if (d > 0){ dx = dx / d * m; dy = dy / d * m; }
  joyThumb.style.transform = `translate(${dx}px, ${dy}px)`;
  mvX = dx / JOY_R; mvY = -dy / JOY_R;     // strafe / forward
}
canvas.addEventListener('touchstart', e => {
  if (!mobileWalk) return;
  const r = joyEl.getBoundingClientRect();
  for (const t of e.changedTouches){
    if (t.clientX < innerWidth * 0.5 && joyId === null){ joyId = t.identifier; joyCx = r.left + r.width/2; joyCy = r.top + r.height/2; updateJoy(t.clientX, t.clientY); }
    else if (lookId === null){ lookId = t.identifier; lookX = t.clientX; lookY = t.clientY; }
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (!mobileWalk) return; e.preventDefault();
  for (const t of e.changedTouches){
    if (t.identifier === joyId) updateJoy(t.clientX, t.clientY);
    else if (t.identifier === lookId){
      yaw -= (t.clientX - lookX) * 0.005; pitch -= (t.clientY - lookY) * 0.005;
      pitch = Math.max(-1.3, Math.min(1.3, pitch)); lookX = t.clientX; lookY = t.clientY;
    }
  }
}, { passive: false });
function endTouch(e){
  for (const t of e.changedTouches){
    if (t.identifier === joyId){ joyId = null; mvX = mvY = 0; joyThumb.style.transform = 'translate(0,0)'; }
    if (t.identifier === lookId) lookId = null;
  }
}
canvas.addEventListener('touchend', endTouch);
canvas.addEventListener('touchcancel', endTouch);

fp.addEventListener('lock', () => {
  fpActive = true; controls.enabled = false; controls.autoRotate = false;
  document.body.classList.add('walk');
});
fp.addEventListener('unlock', () => {
  fpActive = false; controls.enabled = true; document.body.classList.remove('walk');
  const f = forwardVec(); controls.target.copy(camera.position).add(f.multiplyScalar(H*3)); controls.update();
});

const manager = new THREE.LoadingManager();
manager.onProgress = (url, loaded, total) => { if(total) pctEl.textContent = Math.round(loaded/total*100) + '%'; };
manager.onLoad = () => { loaderEl.classList.add('gone'); };
manager.onError = () => showError();

function onModel(model){
  model.scale.setScalar(MODEL_SCALE);   // normalize to real-world meters
  let _tri = 0;
  model.traverse(o => {
    if (o.isMesh){
      o.castShadow = true; o.receiveShadow = true;
      const g = o.geometry;
      _tri += (g.index ? g.index.count : g.attributes.position.count) / 3;
      if (IS_OBJ){   // geometry-only OBJ -> clean white-model material + flat shading
        o.geometry.computeVertexNormals();
        o.material = new THREE.MeshStandardMaterial({ color: 0xdcd5c8, roughness: 0.85, metalness: 0.0, envMapIntensity: 0.5 });
      }
    }
  });
  scene.add(model);
  model.updateMatrixWorld(true);

  // frame the camera to the model's bounding box
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);

  // collision setup: build an octree over the model + a player capsule
  modelScale = maxDim;
  floorY = box.min.y;
  R = 0.3;          // human shoulder radius (meters)
  H = eyeHeight;    // standing eye height (adjustable, meters)
  GRAVITY = maxDim; ACCEL_GROUND = maxDim * 0.9; ACCEL_AIR = maxDim * 0.3;
  fpStart.set(center.x, floorY, center.z);

  // sun shadows aimed at the model
  sun.target.position.copy(center); scene.add(sun.target);
  const sc = sun.shadow.camera;
  sc.left = -maxDim; sc.right = maxDim; sc.top = maxDim; sc.bottom = -maxDim;
  sc.near = maxDim * 0.05; sc.far = maxDim * 12; sc.updateProjectionMatrix();

  // heavy models on phones: skip the octree (building it can freeze a phone) -> simple ground walk
  if (!(MOBILE && _tri > 60000)){
    worldOctree = new Octree();
    worldOctree.fromGraphNode(model);
    if (IS_OBJ){   // OBJ models have no floor -> add a ground plane (shadow catcher + walkable)
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(maxDim * 6, maxDim * 6),
        new THREE.MeshStandardMaterial({ color: 0xbcb3a3, roughness: 1, envMapIntensity: 0.5 }));
      ground.rotation.x = -Math.PI / 2; ground.position.y = floorY; ground.receiveShadow = true;
      scene.add(ground);
      worldOctree.fromGraphNode(ground);
    }
  }
  playerCapsule = new Capsule(
    new THREE.Vector3(center.x, floorY + R, center.z),
    new THREE.Vector3(center.x, floorY + eyeHeight, center.z),
    R
  );

  camera.near = maxDim / 1000; camera.far = maxDim * 30; camera.updateProjectionMatrix();
  controls.target.copy(center);
  controls.minDistance = maxDim * 0.03;
  controls.maxDistance = maxDim * 4;
  const fitDist = (maxDim/2) / Math.tan(THREE.MathUtils.degToRad(camera.fov)/2) * 1.15;
  const dir = new THREE.Vector3(0.65, 0.5, 0.95).normalize();   // 3/4 + elevated to see into the open courtyard
  camera.position.copy(center).add(dir.multiplyScalar(fitDist));
  controls.update();
  stars.scale.setScalar(camera.far * 0.85);     // keep the star sphere inside the far plane

  // interior lamps that glow at night and wash warm light on the walls
  const lx = size.x >= size.z, longLen = lx ? size.x : size.z;
  const ny = floorY + size.y * 0.42;
  lightBaseIntensity = maxDim * maxDim * 0.3;
  const lampGeo = new THREE.SphereGeometry(maxDim * 0.008, 12, 12);
  for (let i = 0; i < 5; i++){
    const f = (i/4 - 0.5) * 0.78;
    const p = new THREE.Vector3(lx ? center.x + f*longLen : center.x, ny, lx ? center.z : center.z + f*longLen);
    const pl = new THREE.PointLight(0xffb366, 0, maxDim * 0.9, 2);
    pl.position.copy(p); scene.add(pl); interiorLights.push(pl);
    const glow = new THREE.Mesh(lampGeo, new THREE.MeshStandardMaterial({ color: 0xffe0b0, emissive: 0xffb366, emissiveIntensity: 0 }));
    glow.position.copy(p); scene.add(glow); glowMeshes.push(glow);
  }

  // camera viewpoint presets: 全景 / 正面 / 俯瞰 / 内部
  const fitD = (maxDim/2) / Math.tan(THREE.MathUtils.degToRad(camera.fov)/2);
  viewPresets = [
    { p: camera.position.clone(), t: center.clone() },
    { p: new THREE.Vector3(center.x, center.y + size.y*0.1, center.z + fitD*1.15), t: center.clone() },
    { p: new THREE.Vector3(center.x + 0.001, center.y + fitD*1.5, center.z + 0.001), t: center.clone() },
    { p: new THREE.Vector3(center.x, floorY + size.y*0.22, center.z),
      t: new THREE.Vector3(lx ? center.x + longLen*0.4 : center.x, floorY + size.y*0.22, lx ? center.z : center.z + longLen*0.4) }
  ];

  setTimeOfDay(tod);     // apply current time to the new lamps + stars

  resize();
  animate();
}

if (IS_OBJ){
  new OBJLoader(manager).load(MODEL_URL, onModel, undefined, () => showError());
} else {
  const draco = new DRACOLoader();
  draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
  const gltf = new GLTFLoader(manager); gltf.setDRACOLoader(draco);
  gltf.load(MODEL_URL, (g) => onModel(g.scene), undefined, () => showError());
}

function showError(){
  loaderEl.innerHTML = '<div class="err">3D 场景加载失败。请检查网络后刷新，或换用本地模型文件。</div>';
  loaderEl.classList.remove('gone');
}

function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w/h; camera.updateProjectionMatrix();
  lastW = w; lastH = h;
}
window.addEventListener('resize', resize, {passive:true});

function animate(){
  const w = window.innerWidth, h = window.innerHeight;
  if (w && h && (w !== lastW || h !== lastH)) resize();   // robust against late layout
  const dt = clock.getDelta();
  if (mixer) mixer.update(dt);
  if (autoCycle) setTimeOfDay(tod + dt * 0.02);
  if (fpActive && playerCapsule){
    if (mobileWalk) camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
    let mf = 0, ms = 0;
    if (mobileWalk){ mf = mvY; ms = mvX; }
    else {
      if (keys['KeyW']||keys['ArrowUp'])    mf += 1;
      if (keys['KeyS']||keys['ArrowDown'])  mf -= 1;
      if (keys['KeyD']||keys['ArrowRight']) ms += 1;
      if (keys['KeyA']||keys['ArrowLeft'])  ms -= 1;
    }
    const sub = Math.min(0.05, dt) / STEPS;        // sub-step to avoid tunnelling
    for (let s = 0; s < STEPS; s++){
      const run = (keys['ShiftLeft']||keys['ShiftRight']) ? 2.2 : 1;
      const accel = (playerOnFloor ? ACCEL_GROUND : ACCEL_AIR) * run;
      if (mf) playerVelocity.addScaledVector(forwardVec(), accel*sub*mf);
      if (ms) playerVelocity.addScaledVector(sideVec(),    accel*sub*ms);
      if (worldOctree){
        let damp = Math.exp(-4 * sub) - 1;             // friction
        if (!playerOnFloor){ playerVelocity.y -= GRAVITY * sub; damp *= 0.1; }
        playerVelocity.addScaledVector(playerVelocity, damp);
        playerCapsule.translate(_step.copy(playerVelocity).multiplyScalar(sub));
        const hit = worldOctree.capsuleIntersect(playerCapsule);   // collide with the model
        playerOnFloor = false;
        if (hit){
          playerOnFloor = hit.normal.y > 0;
          if (!playerOnFloor) playerVelocity.addScaledVector(hit.normal, -hit.normal.dot(playerVelocity));
          playerCapsule.translate(hit.normal.multiplyScalar(hit.depth));   // push out / slide
        }
      } else {
        // no-collision fallback (heavy model on phone): flat-floor walk, no walls
        playerVelocity.y = 0;
        playerVelocity.addScaledVector(playerVelocity, Math.exp(-4 * sub) - 1);
        playerCapsule.translate(_step.copy(playerVelocity).multiplyScalar(sub));
        playerCapsule.start.y = floorY + R; playerCapsule.end.y = floorY + eyeHeight;
        playerOnFloor = true;
      }
    }
    if (worldOctree && playerCapsule.end.y < floorY - H * 4) resetPlayer();   // fell out -> respawn
    camera.position.copy(playerCapsule.end);          // eyes at the top of the capsule
  } else if (flying){
    flyT = Math.min(1, flyT + dt / 1.2);
    const e = easeInOut(flyT);
    camera.position.lerpVectors(flyFromPos, flyToPos, e);
    controls.target.lerpVectors(flyFromTgt, flyToTgt, e);
    camera.lookAt(controls.target);
    if (flyT >= 1) flying = false;
  } else {
    controls.update();
  }
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
</script>
</body>
</html>
